# deploy/docker-compose.yml
services:
  api:
    build: .
    ports: ["8000:8000"]
    environment:
      - REDIS_URL=redis://redis:6379/0
    depends_on: [postgres, redis]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB:       logistics
      POSTGRES_USER:     admin
      POSTGRES_PASSWORD: adminpassword
    volumes: ["pg_data:/var/lib/postgresql/data"]

  redis:
    image: redis:7-alpine
    command: redis-server --maxmemory 512mb --maxmemory-policy allkeys-lru

  celery_worker:
    build: .
    command: celery -A src.workers.retrain_task worker --loglevel=info
    environment:
      - REDIS_URL=redis://redis:6379/0
    depends_on: [redis, postgres]

  celery_beat:
    build: .
    command: celery -A src.workers.retrain_task beat --loglevel=info
    environment:
      - REDIS_URL=redis://redis:6379/0
    depends_on: [redis]

  mlflow:
    image: ghcr.io/mlflow/mlflow:v2.12.2
    ports: ["5000:5000"]
    command: >
      mlflow server --host 0.0.0.0
      --backend-store-uri postgresql://admin:adminpassword@postgres/mlflow

volumes:
  pg_data:
